openapi: '3.0.3'
info:
  title: MealStack Rider Service API
  description: Rider microservice for MealStack food delivery platform
  version: 1.0.0
  contact:
    name: MealStack Team

servers:
  - url: http://localhost:3004
    description: Local development

tags:
  - name: Auth
    description: Rider authentication & profile management
  - name: Orders
    description: Order management & delivery tracking
  - name: Earnings
    description: Earnings & payment dashboard
  - name: Location
    description: GPS location management

paths:
  /api/rider/register:
    post:
      tags: [Auth]
      summary: Register a new rider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password, phone]
              properties:
                name:
                  type: string
                  example: John Rider
                email:
                  type: string
                  example: rider@demo.com
                password:
                  type: string
                  example: rider123
                phone:
                  type: string
                  example: "+94771234567"
                vehicleType:
                  type: string
                  enum: [bike, scooter, car]
                  example: bike
      responses:
        '201':
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '409':
          description: Email already exists

  /api/rider/login:
    post:
      tags: [Auth]
      summary: Rider login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  example: rider@demo.com
                password:
                  type: string
                  example: rider123
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid credentials

  /api/rider/profile:
    get:
      tags: [Auth]
      summary: Get rider profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Rider profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RiderProfile'
    patch:
      tags: [Auth]
      summary: Update rider profile
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                phone:
                  type: string
                vehicleType:
                  type: string
                  enum: [bike, scooter, car]
                profilePhoto:
                  type: string
      responses:
        '200':
          description: Profile updated

  /api/rider/status:
    patch:
      tags: [Auth]
      summary: Toggle online/offline status
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                isOnline:
                  type: boolean
      responses:
        '200':
          description: Status updated

  /api/rider/location:
    patch:
      tags: [Location]
      summary: Update rider GPS location
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [lat, lng]
              properties:
                lat:
                  type: number
                  example: 6.9271
                lng:
                  type: number
                  example: 79.8612
      responses:
        '200':
          description: Location updated
    get:
      tags: [Location]
      summary: Get rider current location
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current location

  /api/orders/available:
    get:
      tags: [Orders]
      summary: Get available orders nearby
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of available orders
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  orders:
                    type: array
                    items:
                      $ref: '#/components/schemas/AvailableOrder'

  /api/orders/{id}/accept:
    post:
      tags: [Orders]
      summary: Accept an order
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Order accepted
        '404':
          description: Order not found
        '409':
          description: Already have active delivery

  /api/orders/{id}/reject:
    post:
      tags: [Orders]
      summary: Reject an order
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        '200':
          description: Order rejected

  /api/orders/{id}/status:
    patch:
      tags: [Orders]
      summary: Update order delivery status
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [ASSIGNED, PICKED_UP, ON_THE_WAY, DELIVERED, CANCELLED]
                deliveryNotes:
                  type: string
                deliveryPhoto:
                  type: string
      responses:
        '200':
          description: Status updated

  /api/orders/active:
    get:
      tags: [Orders]
      summary: Get current active order
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Active order or null

  /api/orders/history:
    get:
      tags: [Orders]
      summary: Get order history
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated order history

  /api/earnings/summary:
    get:
      tags: [Earnings]
      summary: Get earnings summary
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Earnings summary with today, week, month breakdowns

  /api/earnings/history:
    get:
      tags: [Earnings]
      summary: Get earnings history
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Paginated earnings history

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    AuthResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        token:
          type: string
        rider:
          $ref: '#/components/schemas/RiderProfile'

    RiderProfile:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        vehicleType:
          type: string
        isOnline:
          type: boolean
        rating:
          type: number
        totalDeliveries:
          type: integer
        totalEarnings:
          type: number
        currentLocation:
          type: object
          properties:
            lat:
              type: number
            lng:
              type: number

    AvailableOrder:
      type: object
      properties:
        orderId:
          type: string
        restaurantName:
          type: string
        customerName:
          type: string
        pickupLocation:
          type: object
          properties:
            lat:
              type: number
            lng:
              type: number
            address:
              type: string
        deliveryLocation:
          type: object
          properties:
            lat:
              type: number
            lng:
              type: number
            address:
              type: string
        distance:
          type: number
        estimatedTime:
          type: integer
        earnings:
          type: number
