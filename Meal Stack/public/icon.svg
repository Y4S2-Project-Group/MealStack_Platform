  <!-- Top bun -->
  <ellipse cx="256" cy="230" rx="90" ry="35" fill="#DEB887"/>
  <ellipse cx="256" cy="225" rx="90" ry="30" fill="#F4A460"/>
  
  <!-- Sesame seeds -->
  <circle cx="226" cy="220" r="4" fill="#FFF"/>
  <circle cx="246" cy="218" r="4" fill="#FFF"/>
  <circle cx="266" cy="217" r="4" fill="#FFF"/>
  <circle cx="286" cy="219" r="4" fill="#FFF"/>
  <circle cx="236" cy="227" r="3" fill="#FFF"/>
  <circle cx="276" cy="226" r="3" fill="#FFF"/>
  
  <!-- Fork and Knife icons -->
