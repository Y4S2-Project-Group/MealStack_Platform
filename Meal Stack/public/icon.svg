  <!-- Patty -->
  <ellipse cx="256" cy="265" rx="85" ry="22" fill="#8B4513"/>
  
  <!-- Lettuce -->
  <path d="M 176 250 Q 186 245 196 248 Q 206 246 216 249 Q 226 247 236 250 Q 246 248 256 251 Q 266 249 276 252 Q 286 250 296 253 Q 306 251 316 254 Q 326 252 336 255 L 336 265 Q 326 262 316 264 Q 306 261 296 263 Q 286 260 276 262 Q 266 259 256 261 Q 246 258 236 260 Q 226 257 216 259 Q 206 256 196 258 Q 186 255 176 258 Z" fill="#90EE90"/>
  
  <!-- Cheese -->
