  <g transform="translate(140, 240)">
    <rect x="0" y="0" width="3" height="70" rx="1.5" fill="#FFF" opacity="0.9"/>
    <rect x="6" y="0" width="3" height="70" rx="1.5" fill="#FFF" opacity="0.9"/>
    <rect x="12" y="0" width="3" height="70" rx="1.5" fill="#FFF" opacity="0.9"/>
    <rect x="0" y="0" width="15" height="25" rx="2" fill="#FFF" opacity="0.9"/>
