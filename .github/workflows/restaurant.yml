name: Restaurant Service

on:
  push:
    branches: [main]
    paths:
      - "services/restaurant/**"
      - ".github/workflows/restaurant.yml"
  pull_request:
    branches: [main]
    paths:
      - "services/restaurant/**"
      - ".github/workflows/restaurant.yml"

jobs:
  ci:
    name: Test & Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test --workspace=services/restaurant

      - name: Run Snyk security scan
        run: npx snyk test --severity-threshold=critical --all-projects
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  cd:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure Container Registry
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build and push Docker image
        run: |
          IMAGE=${{ secrets.ACR_NAME }}.azurecr.io/mealstack-restaurant:${{ github.sha }}
          docker build -t "$IMAGE" ./services/restaurant
          docker push "$IMAGE"

      - name: Deploy to Azure Container App
        run: |
          az containerapp update \
            --name ${{ secrets.AZURE_CONTAINER_APP_RESTAURANT_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image ${{ secrets.ACR_NAME }}.azurecr.io/mealstack-restaurant:${{ github.sha }}
