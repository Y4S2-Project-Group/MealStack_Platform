name: Order Service

on:
  push:
    branches: [main]
    paths:
      - "services/order/**"
      - ".github/workflows/order.yml"
  pull_request:
    branches: [main]
    paths:
      - "services/order/**"
      - ".github/workflows/order.yml"

jobs:
  ci:
    name: Test & Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test --workspace=services/order

      - name: Run Snyk security scan
        working-directory: services/order
        run: |
          npm ci
          npx snyk test --severity-threshold=critical
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  cd:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build and push Docker image
        run: |
          IMAGE=${{ secrets.ACR_NAME }}.azurecr.io/mealstack-order:${{ github.sha }}
          docker build -t "$IMAGE" ./services/order
          docker push "$IMAGE"

      - name: Deploy to Azure Container App
        run: |
          az containerapp update \
            --name ${{ secrets.AZURE_CONTAINER_APP_ORDER_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image ${{ secrets.ACR_NAME }}.azurecr.io/mealstack-order:${{ github.sha }}
