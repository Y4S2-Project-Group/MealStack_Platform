name: Contract Governance

on:
  pull_request:
    branches: [main]
    paths:
      - 'services/**/src/swagger/**'
      - 'contracts/**'
      - 'scripts/check-contract-*.js'
      - 'scripts/export-openapi.js'
      - '.github/workflows/contracts.yml'
      - 'package.json'
  push:
    branches: [main]
    paths:
      - 'services/**/src/swagger/**'
      - 'contracts/**'
      - 'scripts/check-contract-*.js'
      - 'scripts/export-openapi.js'
      - '.github/workflows/contracts.yml'
      - 'package.json'

jobs:
  contracts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check contract drift
        run: npm run contracts:check

      - name: Check contract policy
        run: npm run contracts:policy-check
