name: Deploy Rider Service to ECS

on:
    push:
        branches:
            - main
        paths:
            - "services/rider/**"
            - ".github/workflows/rider-deploy.yml"
    workflow_dispatch:

env:
    AWS_REGION: eu-north-1
    ECR_REPOSITORY: mealstack-rider
    ECS_CLUSTER: mealstack-cluster
    ECS_SERVICE: rider-service
    CONTAINER_NAME: rider

jobs:
    deploy:
        name: Build and Deploy Rider Service
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write

        steps:
            - name: Checkout code
              uses: actions/checkout@v3

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v2
              with:
                  role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
                  aws-region: ${{ env.AWS_REGION }}

            - name: Login to Amazon ECR
              id: login-ecr
              uses: aws-actions/amazon-ecr-login@v1

            - name: Build, tag, and push image to Amazon ECR
              id: image
              env:
                  ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
                  IMAGE_TAG: ${{ github.sha }}
              run: |
                  docker build -f services/rider/Dockerfile \
                    -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
                    .
                  docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
                  echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

            - name: Run Snyk scanning
              continue-on-error: true
              uses: snyk/actions/node@master
              env:
                  SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
              with:
                  args: --file=services/rider/package.json --severity-threshold=high

            - name: Update ECS task definition
              id: task-def
              uses: aws-actions/amazon-ecs-render-task-definition@v1
              with:
                  task-definition: infra/aws/task-definitions/rider-task-definition.json
                  container-name: ${{ env.CONTAINER_NAME }}
                  image: ${{ steps.image.outputs.image }}

            - name: Deploy to Amazon ECS
              uses: aws-actions/amazon-ecs-deploy-task-definition@v1
              with:
                  task-definition: ${{ steps.task-def.outputs.task-definition }}
                  service: ${{ env.ECS_SERVICE }}
                  cluster: ${{ env.ECS_CLUSTER }}
                  wait-for-service-stability: false

            - name: Notify deployment success
              if: success()
              run: echo "✅ Rider Service deployment succeeded"
            
            - name: Notify deployment failure
              if: failure()
              run: echo "❌ Rider Service deployment failed"
