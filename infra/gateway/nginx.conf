server {
  listen 80;
  server_name _;

  # Preserve request context/identity headers across hops.
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header X-Trace-Id $http_x_trace_id;
  proxy_set_header Authorization $http_authorization;

  # Gateway health
  location = /health {
    default_type application/json;
    return 200 '{"status":"ok","service":"gateway"}';
  }

  # Auth service
  location /auth/ {
    proxy_pass http://auth:4001/auth/;
  }

  location /users/ {
    proxy_pass http://auth:4001/users/;
  }

  # Restaurant service
  location /restaurants/ {
    proxy_pass http://restaurant:4002/restaurants/;
  }

  # Order service
  location /orders/ {
    proxy_pass http://order:4003/orders/;
  }

  # Payment service
  location /payments/ {
    proxy_pass http://payment:4004/payments/;
  }

  # Rider service
  location /deliveries/ {
    proxy_pass http://rider:4005/deliveries/;
  }

  # Swagger docs passthrough per service (viva/demo friendly)
  location /docs/auth {
    proxy_pass http://auth:4001/docs;
  }

  location /docs/restaurant {
    proxy_pass http://restaurant:4002/docs;
  }

  location /docs/order {
    proxy_pass http://order:4003/docs;
  }

  location /docs/payment {
    proxy_pass http://payment:4004/docs;
  }

  location /docs/rider {
    proxy_pass http://rider:4005/docs;
  }

  # OpenAPI JSON passthrough per service
  location /openapi/auth.json {
    proxy_pass http://auth:4001/openapi.json;
  }

  location /openapi/restaurant.json {
    proxy_pass http://restaurant:4002/openapi.json;
  }

  location /openapi/order.json {
    proxy_pass http://order:4003/openapi.json;
  }

  location /openapi/payment.json {
    proxy_pass http://payment:4004/openapi.json;
  }

  location /openapi/rider.json {
    proxy_pass http://rider:4005/openapi.json;
  }

  # Aggregated OpenAPI index (single discovery endpoint)
  location = /openapi/index.json {
    default_type application/json;
    return 200 '{"services":[{"name":"auth","url":"/openapi/auth.json"},{"name":"restaurant","url":"/openapi/restaurant.json"},{"name":"order","url":"/openapi/order.json"},{"name":"payment","url":"/openapi/payment.json"},{"name":"rider","url":"/openapi/rider.json"}],"docs":[{"name":"auth","url":"/docs/auth"},{"name":"restaurant","url":"/docs/restaurant"},{"name":"order","url":"/docs/order"},{"name":"payment","url":"/docs/payment"},{"name":"rider","url":"/docs/rider"}]}' ;
  }
}
